name: Dependabot auto-merge

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_CC_PUBLISH_GH_APP_ID }}
          private-key: ${{ secrets.GH_CC_PUBLISH_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Approve PR
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ inputs.pr-number }}"
          gh pr review --approve "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR for minor/patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ inputs.pr-number }}"
          gh pr merge --squash --delete-branch --auto "$PR_URL"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
